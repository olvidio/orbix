openapi: "3.1.0"
info:
  title: "Orbix API - profesores"
  version: "0.1.0"
  description: |
    OpenAPI generado desde `docs/catalogo`. Revisar obligatoriedad de campos y ejemplos antes de publicarlo como contrato estable.
  license:
    name: "Proprietary"
    identifier: "LicenseRef-Proprietary"
servers:
  - url: "/"
security:
  - OrbixSession: []
paths:
  "/src/profesores/congresos":
    post:
      operationId: "post_profesores_congresos"
      summary: "Congresos"
      description: |
        Listado global de asistencia a congresos del claustro: por cada profesor activo muestra delegación (en RSTGR), nombre, tipo, lugar, fechas y organizador.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/profesores/api/congresos.md`
      tags:
        - "profesores"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_CongresosListaDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_CongresosListaDataResponse"
  "/src/profesores/docencia":
    post:
      operationId: "post_profesores_docencia"
      summary: "Docencia"
      description: |
        Listado global de docencia STGR registrada: por cada profesor activo muestra delegación (en RSTGR), nombre, curso de inicio, asignatura, modo de impartición y acta.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/profesores/api/docencia.md`
      tags:
        - "profesores"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_DocenciaListaDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_DocenciaListaDataResponse"
  "/src/profesores/ficha_profesor_stgr":
    post:
      operationId: "post_profesores_ficha_profesor_stgr"
      summary: "Ficha Profesor Stgr"
      description: |
        Dossier académico STGR de un profesor: datos personales, nombramientos, curriculum, ampliaciones, congresos, docencia, director de departamento, juramento y publicaciones. En modo impresión (`print`) omite director, juramento y publicaciones y filtra nombramientos sin cese.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/profesores/api/ficha_profesor_stgr.md`
      tags:
        - "profesores"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "post.id_nom"
              properties:
                depende:
                  type: "string"
                id_nom:
                  type: "integer"
                id_tabla:
                  type: "string"
                obj_pau:
                  type: "string"
                permiso:
                  type: "string"
                print:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_FichaProfesorStgrDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_FichaProfesorStgrDataResponse"
  "/src/profesores/lista_por_departamentos":
    post:
      operationId: "post_profesores_lista_por_departamentos"
      summary: "Lista Por Departamentos"
      description: |
        Claustro STGR agrupado por departamento: directores y profesores por tipo, o formulario de filtro por delegación en ámbito regional.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/profesores/api/lista_por_departamentos.md`
      tags:
        - "profesores"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dl:
                  type: "array"
                  items:
                    type: string
                filtro:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_ListaPorDepartamentosDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_ListaPorDepartamentosDataResponse"
  "/src/profesores/profesor_asignatura_ajax":
    post:
      operationId: "post_profesores_profesor_asignatura_ajax"
      summary: "Profesor Asignatura Ajax"
      description: |
        Tabla de profesores habilitados para una asignatura: del departamento y por ampliación, con centro, historial de docencia y contacto.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/profesores/api/profesor_asignatura_ajax.md`
      tags:
        - "profesores"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "post.id_asignatura"
              properties:
                id_asignatura:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_ProfesoresAsignaturaListaDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_ProfesoresAsignaturaListaDataResponse"
  "/src/profesores/profesor_asignatura_que":
    post:
      operationId: "post_profesores_profesor_asignatura_que"
      summary: "Profesor Asignatura Que"
      description: |
        Opciones del desplegable de asignatura para consultar profesores habilitados.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/profesores/api/profesor_asignatura_que.md`
      tags:
        - "profesores"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_ProfesorAsignaturaQueDataDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/profesores_ProfesorAsignaturaQueDataDataResponse"
