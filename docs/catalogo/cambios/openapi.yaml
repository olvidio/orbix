openapi: "3.1.0"
info:
  title: "Orbix API - cambios"
  version: "0.1.0"
  description: |
    OpenAPI generado desde `docs/catalogo`. Revisar obligatoriedad de campos y ejemplos antes de publicarlo como contrato estable.
  license:
    name: "Proprietary"
    identifier: "LicenseRef-Proprietary"
servers:
  - url: "/"
security:
  - OrbixSession: []
paths:
  "/src/cambios/avisos_generar_lista_data":
    post:
      operationId: "post_cambios_avisos_generar_lista_data"
      summary: "Avisos Generar Lista Data"
      description: |
        Listado de `CambioUsuario` pendientes de avisar (`avisado=false`) para el usuario y tipo de aviso indicados, más opciones de desplegables y metadatos de borrado de la pantalla `avisos_generar`.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/avisos_generar_lista_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                aviso_tipo:
                  type: "integer"
                id_usuario:
                  type: "integer"
                is_admin:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_eliminar":
    post:
      operationId: "post_cambios_cambio_usuario_eliminar"
      summary: "Cambio Usuario Eliminar"
      description: |
        Elimina uno o varios `CambioUsuario` por la clave compuesta recibida en `sel[]`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_eliminar.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_eliminar_hasta_fecha":
    post:
      operationId: "post_cambios_cambio_usuario_eliminar_hasta_fecha"
      summary: "Cambio Usuario Eliminar Hasta Fecha"
      description: |
        Elimina los `CambioUsuario` con fecha anterior o igual a `f_fin`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_eliminar_hasta_fecha.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "f_fin"
              properties:
                f_fin:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_objeto_pref_eliminar":
    post:
      operationId: "post_cambios_cambio_usuario_objeto_pref_eliminar"
      summary: "Cambio Usuario Objeto Pref Eliminar"
      description: |
        Elimina un `CambioUsuarioObjetoPref` (preferencia de aviso sobre un objeto/tipo de actividad).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_objeto_pref_eliminar.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_item_usuario_objeto"
              properties:
                id_item_usuario_objeto:
                  type: "integer"
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_objeto_pref_fases_data":
    post:
      operationId: "post_cambios_cambio_usuario_objeto_pref_fases_data"
      summary: "Cambio Usuario Objeto Pref Fases Data"
      description: |
        Lista de fases (o estados de actividad) posibles para el `id_tipo_activ` indicado.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_objeto_pref_fases_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "objeto"
              properties:
                dl_propia:
                  type: "string"
                id_tipo_activ:
                  type: "string"
                objeto:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_objeto_pref_guardar":
    post:
      operationId: "post_cambios_cambio_usuario_objeto_pref_guardar"
      summary: "Cambio Usuario Objeto Pref Guardar"
      description: |
        Crea o actualiza un `CambioUsuarioObjetoPref` (qué objeto/tipo/fase/tipo de aviso se escucha).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_objeto_pref_guardar.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_usuario"
              properties:
                aviso_off:
                  type: "string"
                aviso_on:
                  type: "string"
                aviso_outdate:
                  type: "string"
                aviso_tipo:
                  type: "integer"
                casas:
                  type: "array"
                  items:
                    type: string
                dl_propia:
                  type: "string"
                id_fase_ref:
                  type: "integer"
                id_item_usuario_objeto:
                  type: "integer"
                id_tipo_activ:
                  type: "string"
                id_usuario:
                  type: "integer"
                objeto:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_objeto_pref_propiedades_data":
    post:
      operationId: "post_cambios_cambio_usuario_objeto_pref_propiedades_data"
      summary: "Cambio Usuario Objeto Pref Propiedades Data"
      description: |
        Listado de propiedades configurables del objeto, preseleccionadas según preferencias guardadas.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_objeto_pref_propiedades_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "objeto"
              properties:
                id_item_usuario_objeto:
                  type: "integer"
                objeto:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_propiedad_pref_guardar_todas":
    post:
      operationId: "post_cambios_cambio_usuario_propiedad_pref_guardar_todas"
      summary: "Cambio Usuario Propiedad Pref Guardar Todas"
      description: |
        Sincroniza las `CambioUsuarioPropiedadPref` de un `CambioUsuarioObjetoPref`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_propiedad_pref_guardar_todas.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_item_usuario_objeto_prop"
                - "objeto_prop"
              properties:
                id_item_usuario_objeto_prop:
                  type: "integer"
                objeto_prop:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_propiedad_pref_item_data":
    post:
      operationId: "post_cambios_cambio_usuario_propiedad_pref_item_data"
      summary: "Cambio Usuario Propiedad Pref Item Data"
      description: |
        Datos del modal de condición para una propiedad (`id_item` existente o nueva).
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_propiedad_pref_item_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "propiedad"
              properties:
                id_item:
                  type: "integer"
                objeto:
                  type: "string"
                propiedad:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_propiedad_pref_preview":
    post:
      operationId: "post_cambios_cambio_usuario_propiedad_pref_preview"
      summary: "Cambio Usuario Propiedad Pref Preview"
      description: |
        Calcula el texto de preview de una condición sin persistir (operación de lectura/cálculo).
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_propiedad_pref_preview.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "propiedad"
              properties:
                id_item:
                  type: "integer"
                id_ubi:
                  type: "array"
                  items:
                    type: string
                objeto:
                  type: "string"
                operador:
                  type: "string"
                propiedad:
                  type: "string"
                valor:
                  type: "string"
                valor_new:
                  type: "string"
                valor_old:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/usuario_avisos_pref_form_data":
    post:
      operationId: "post_cambios_usuario_avisos_pref_form_data"
      summary: "Usuario Avisos Pref Form Data"
      description: |
        Bootstrap del formulario `usuario_avisos_pref` (configurar aviso para usuario o grupo).
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/usuario_avisos_pref_form_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_usuario"
              properties:
                id_item_usuario_objeto:
                  type: "integer"
                id_usuario:
                  type: "integer"
                quien:
                  type: "string"
                salida:
                  type: "string"
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/usuario_form_avisos_data":
    post:
      operationId: "post_cambios_usuario_form_avisos_data"
      summary: "Usuario Form Avisos Data"
      description: |
        Listado de `CambioUsuarioObjetoPref` de un usuario para la tabla `usuario_form_avisos`.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/usuario_form_avisos_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_usuario"
                - "quien"
              properties:
                id_usuario:
                  type: "integer"
                quien:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
components:
  securitySchemes:
    OrbixSession:
      type: apiKey
      in: cookie
      name: PHPSESSID
  schemas:
    OrbixStandardResponseStringData:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          description: "En ContestarJson::enviar, los arrays/objetos suelen llegar codificados como string JSON por compatibilidad."
