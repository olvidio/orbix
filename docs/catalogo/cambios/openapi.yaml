openapi: "3.1.0"
info:
  title: "Orbix API - cambios"
  version: "0.1.0"
  description: |
    OpenAPI generado desde `docs/catalogo`. Revisar obligatoriedad de campos y ejemplos antes de publicarlo como contrato estable.
  license:
    name: "Proprietary"
    identifier: "LicenseRef-Proprietary"
servers:
  - url: "/"
security:
  - OrbixSession: []
paths:
  "/src/cambios/avisos_generar_lista_data":
    post:
      operationId: "post_cambios_avisos_generar_lista_data"
      summary: "Avisos Generar Lista Data"
      description: |
        Endpoint backend: listado de avisos `CambioUsuario` (con `avisado=false`) para el usuario/aviso_tipo dado + opciones de desplegables de la pantalla `avisos_generar`.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/avisos_generar_lista_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                aviso_tipo:
                  type: "integer"
                id_usuario:
                  type: "integer"
                is_admin:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_eliminar":
    post:
      operationId: "post_cambios_cambio_usuario_eliminar"
      summary: "Cambio Usuario Eliminar"
      description: |
        Endpoint backend: elimina `CambioUsuario` por la clave compuesta `id_item_cambio#id_usuario#sfsv#aviso_tipo` recibida en `sel[]`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_eliminar.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioEliminarDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioEliminarDataResponse"
  "/src/cambios/cambio_usuario_eliminar_hasta_fecha":
    post:
      operationId: "post_cambios_cambio_usuario_eliminar_hasta_fecha"
      summary: "Cambio Usuario Eliminar Hasta Fecha"
      description: |
        Endpoint backend: elimina los `CambioUsuario` con fecha <= `f_fin`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_eliminar_hasta_fecha.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                f_fin:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioEliminarHastaFechaDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioEliminarHastaFechaDataResponse"
  "/src/cambios/cambio_usuario_objeto_pref_eliminar":
    post:
      operationId: "post_cambios_cambio_usuario_objeto_pref_eliminar"
      summary: "Cambio Usuario Objeto Pref Eliminar"
      description: |
        Endpoint JSON: elimina un `CambioUsuarioObjetoPref`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_objeto_pref_eliminar.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_item_usuario_objeto:
                  type: "integer"
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioObjetoPrefEliminarDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioObjetoPrefEliminarDataResponse"
  "/src/cambios/cambio_usuario_objeto_pref_fases_data":
    post:
      operationId: "post_cambios_cambio_usuario_objeto_pref_fases_data"
      summary: "Cambio Usuario Objeto Pref Fases Data"
      description: |
        Endpoint JSON: lista de fases para el tipo de actividad indicado.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_objeto_pref_fases_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dl_propia:
                  type: "string"
                id_tipo_activ:
                  type: "string"
                objeto:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_objeto_pref_guardar":
    post:
      operationId: "post_cambios_cambio_usuario_objeto_pref_guardar"
      summary: "Cambio Usuario Objeto Pref Guardar"
      description: |
        Endpoint JSON: crea o actualiza un `CambioUsuarioObjetoPref`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_objeto_pref_guardar.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                aviso_off:
                  type: "string"
                aviso_on:
                  type: "string"
                aviso_outdate:
                  type: "string"
                aviso_tipo:
                  type: "integer"
                casas:
                  type: "array"
                  items:
                    type: string
                dl_propia:
                  type: "string"
                id_fase_ref:
                  type: "integer"
                id_item_usuario_objeto:
                  type: "integer"
                id_tipo_activ:
                  type: "string"
                id_usuario:
                  type: "integer"
                objeto:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioObjetoPrefGuardarDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioObjetoPrefGuardarDataResponse"
  "/src/cambios/cambio_usuario_objeto_pref_propiedades_data":
    post:
      operationId: "post_cambios_cambio_usuario_objeto_pref_propiedades_data"
      summary: "Cambio Usuario Objeto Pref Propiedades Data"
      description: |
        Endpoint JSON: listado de propiedades configurables del objeto indicado, preseleccionadas segun las preferencias ya guardadas.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_objeto_pref_propiedades_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_item_usuario_objeto:
                  type: "integer"
                objeto:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_propiedad_pref_guardar_todas":
    post:
      operationId: "post_cambios_cambio_usuario_propiedad_pref_guardar_todas"
      summary: "Cambio Usuario Propiedad Pref Guardar Todas"
      description: |
        Endpoint JSON: sincroniza las `CambioUsuarioPropiedadPref` para un `CambioUsuarioObjetoPref`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_propiedad_pref_guardar_todas.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_item_usuario_objeto_prop:
                  type: "string"
                objeto_prop:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioPropiedadPrefGuardarTodasDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioPropiedadPrefGuardarTodasDataResponse"
  "/src/cambios/cambio_usuario_propiedad_pref_item_data":
    post:
      operationId: "post_cambios_cambio_usuario_propiedad_pref_item_data"
      summary: "Cambio Usuario Propiedad Pref Item Data"
      description: |
        Endpoint JSON: devuelve los datos de una condicion por `id_item` (si existe) y la lista de casas cuando la propiedad es `id_ubi`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_propiedad_pref_item_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_item:
                  type: "integer"
                objeto:
                  type: "string"
                propiedad:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/cambio_usuario_propiedad_pref_preview":
    post:
      operationId: "post_cambios_cambio_usuario_propiedad_pref_preview"
      summary: "Cambio Usuario Propiedad Pref Preview"
      description: |
        Endpoint JSON: construye el texto de preview de la condicion y el array serializado (cambio_prop) sin persistir nada.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/cambio_usuario_propiedad_pref_preview.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_item:
                  type: "integer"
                id_ubi:
                  type: "array"
                  items:
                    type: string
                objeto:
                  type: "string"
                operador:
                  type: "string"
                propiedad:
                  type: "string"
                valor:
                  type: "string"
                valor_new:
                  type: "string"
                valor_old:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioPropiedadPrefPreviewDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_CambioUsuarioPropiedadPrefPreviewDataResponse"
  "/src/cambios/usuario_avisos_pref_form_data":
    post:
      operationId: "post_cambios_usuario_avisos_pref_form_data"
      summary: "Usuario Avisos Pref Form Data"
      description: |
        Endpoint JSON que devuelve la informacion necesaria para pintar el formulario `usuario_avisos_pref` (edicion de un aviso de usuario/grupo).
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/usuario_avisos_pref_form_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_item_usuario_objeto:
                  type: "integer"
                id_usuario:
                  type: "integer"
                quien:
                  type: "string"
                salida:
                  type: "string"
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cambios/usuario_form_avisos_data":
    post:
      operationId: "post_cambios_usuario_form_avisos_data"
      summary: "Usuario Form Avisos Data"
      description: |
        Endpoint backend: datos para el listado de avisos de un usuario.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cambios/api/usuario_form_avisos_data.md`
      tags:
        - "cambios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_usuario:
                  type: "integer"
                quien:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_UsuarioFormAvisosDataDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cambios_UsuarioFormAvisosDataDataResponse"
components:
