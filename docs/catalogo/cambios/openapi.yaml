      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          description: "Ver schema concreto de cada operacion."
    cambios_CambioUsuarioEliminarData:
      type: object
      properties:
        ok:
          type: "string"
    cambios_CambioUsuarioEliminarDataResponse:
      allOf:
        - $ref: "#/components/schemas/OrbixStandardResponseEnvelope"
        - type: object
          properties:
            data:
              oneOf:
                - type: string
                  description: "JSON codificado como string (compatibilidad legacy)."
                - $ref: "#/components/schemas/cambios_CambioUsuarioEliminarData"
    cambios_CambioUsuarioEliminarHastaFechaData:
      type: object
      properties:
        ok:
          type: "string"
    cambios_CambioUsuarioEliminarHastaFechaDataResponse:
