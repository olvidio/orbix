paths:
  "/src/casas/calendario_ubi_resumen_data":
    post:
      operationId: "post_casas_calendario_ubi_resumen_data"
      summary: "Calendario Ubi Resumen Data"
      description: |
        Endpoint backend: datos del estudio económico de una casa (`calendario_ubi_resumen`).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/casas/api/calendario_ubi_resumen_data.md`
      tags:
        - "casas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                G:
                  type: "integer"
                id_ubi:
                  type: "integer"
                inc_t:
                  type: "integer"
                seccion:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/casas_CalendarioUbiResumenDataDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/casas_CalendarioUbiResumenDataDataResponse"
