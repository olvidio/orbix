          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/casas/casa_ec_gastos_guardar":
    post:
      operationId: "post_casas_casa_ec_gastos_guardar"
      summary: "Casa Ec Gastos Guardar"
      description: |
        Use case: guardar los gastos y aportaciones (sv/sf) mensuales de una casa para un año completo. Borra los existentes y los reinserta con fecha 5 de cada mes. Sucesor de la rama `que=guardarGasto` de `apps/casas/controller/casa_ec_ajax.php`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/casas/api/casa_ec_gastos_guardar.md`
      tags:
        - "casas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                "ap_sf$m":
                  type: "string"
                "ap_sv$m":
                  type: "string"
                "g$m":
                  type: "string"
                id_ubi:
                  type: "integer"
                year:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
