  "/src/casas/casas_resumen_data":
    post:
      operationId: "post_casas_casas_resumen_data"
      summary: "Casas Resumen Data"
      description: |
        Use case: resumen económico de casas (dias ocupados, asistentes previstos/reales, ingresos, gastos, aportaciones, superávit). Sucesor de `apps/casas/controller/casas_resumen_ajax.php`. Dos modos: - `que=''` → un único periodo (año/trimestre/rango) por casa. - `que!=''` → estadística por año (5 años) por casa.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/casas/api/casas_resumen_data.md`
      tags:
        - "casas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                cdc_sel:
                  type: "integer"
                empiezamax:
                  type: "string"
                empiezamin:
                  type: "string"
                id_cdc:
                  type: "array"
                  items:
                    type: string
                periodo:
                  type: "string"
                que:
                  type: "string"
                year:
                  type: "string"
      responses:
