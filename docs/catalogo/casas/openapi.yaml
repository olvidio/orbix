  "/src/casas/casa_ec_gastos_form_data":
    post:
      operationId: "post_casas_casa_ec_gastos_form_data"
      summary: "Casa Ec Gastos Form Data"
      description: |
        Data builder: formulario anual con gastos y aportaciones (sv/sf) por mes de una casa. Sucesor de la rama `que=getGastos` de `apps/casas/controller/casa_ec_ajax.php`.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/casas/api/casa_ec_gastos_form_data.md`
      tags:
        - "casas"
      requestBody:
        required: true
        content:
