          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/cartaspresentacion/poblaciones_data":
    post:
      operationId: "post_cartaspresentacion_poblaciones_data"
      summary: "Poblaciones Data"
      description: |
        Endpoint backend: opciones del desplegable de poblaciones segun el filtro elegido (`get_H`, `get_r`, `get_dl`).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cartaspresentacion/api/poblaciones_data.md`
      tags:
