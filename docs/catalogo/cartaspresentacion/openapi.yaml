      summary: "Cartas Presentacion Lista Data"
      description: |
        Endpoint backend: listado agrupado de cartas de presentacion (modo `lista_dl`, `lista_todo` o `get` con filtros).
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/cartaspresentacion/api/cartas_presentacion_lista_data.md`
      tags:
