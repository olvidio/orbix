      operationId: "post_cartaspresentacion_carta_presentacion_form_data"
      summary: "Carta Presentacion Form Data"
      description: |
        Endpoint backend: datos del formulario de modificacion de una `CartaPresentacion` (valida permisos: solo dl propia o `cr`).
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/cartaspresentacion/api/carta_presentacion_form_data.md`
      tags:
        - "cartaspresentacion"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_direccion:
                  type: "integer"
                id_ubi:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
