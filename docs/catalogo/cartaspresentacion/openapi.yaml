            application/json:
              schema:
                $ref: "#/components/schemas/cartaspresentacion_CartaPresentacionFormDataDataResponse"
  "/src/cartaspresentacion/carta_presentacion_update":
    post:
      operationId: "post_cartaspresentacion_carta_presentacion_update"
      summary: "Carta Presentacion Update"
      description: |
        Endpoint backend: crea / actualiza una `CartaPresentacion`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cartaspresentacion/api/carta_presentacion_update.md`
      tags:
