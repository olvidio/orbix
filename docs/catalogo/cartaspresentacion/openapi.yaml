      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_direccion:
                  type: "integer"
                id_ubi:
                  type: "integer"
                observ:
                  type: "string"
                pres_mail:
                  type: "string"
                pres_nom:
                  type: "string"
                pres_telf:
                  type: "string"
                zona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cartaspresentacion_CartaPresentacionUpdateDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cartaspresentacion_CartaPresentacionUpdateDataResponse"
