      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                poblacion_sel:
                  type: "string"
                tipo_lista:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cartaspresentacion_CartasPresentacionUbisListaDataDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cartaspresentacion_CartasPresentacionUbisListaDataDataResponse"
