      operationId: "post_cartaspresentacion_carta_presentacion_eliminar"
      summary: "Carta Presentacion Eliminar"
      description: |
        Endpoint backend: elimina una `CartaPresentacion`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/cartaspresentacion/api/carta_presentacion_eliminar.md`
      tags:
        - "cartaspresentacion"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_direccion:
                  type: "integer"
                id_ubi:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cartaspresentacion_CartaPresentacionEliminarDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/cartaspresentacion_CartaPresentacionEliminarDataResponse"
  "/src/cartaspresentacion/carta_presentacion_form_data":
