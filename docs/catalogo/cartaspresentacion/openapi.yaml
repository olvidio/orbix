              schema:
                $ref: "#/components/schemas/cartaspresentacion_CartasPresentacionPoblacionesDataDataResponse"
  "/src/cartaspresentacion/ubis_lista_data":
    post:
      operationId: "post_cartaspresentacion_ubis_lista_data"
      summary: "Ubis Lista Data"
      description: |
        Endpoint backend: listado de centros con el estado de su carta de presentacion, en dos variantes (delegacion del usuario o centros extranjeros).
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/cartaspresentacion/api/ubis_lista_data.md`
      tags:
