      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dl:
                  type: "string"
                pais:
                  type: "string"
                poblacion:
                  type: "string"
                que:
                  type: "string"
                region:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
