      summary: "Texto editable de grupo EGM"
      description: |
        Devuelve texto almacenado para cabecera/listado de un grupo o item EGM.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/texto_de_egm.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_equipaje:
                  type: "integer"
                id_grupo:
                  type: "integer"
                id_item_egm:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/traslado_doc_guardar":
    post:
      operationId: "post_inventario_traslado_doc_guardar"
      summary: "Trasladar documentos"
      description: |
        Mueve documentos seleccionados (`sel` array id_doc) a otro centro/lugar (`id_ubi_new`, `id_lugar_new`). Si `id_ubi_new` vacío, desasigna ubi.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/traslado_doc_guardar.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "sel"
              properties:
                sel:
                  type: "array"
                  items:
                    type: string
                id_ubi_new:
                  type: "integer"
                id_lugar_new:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
components:
  securitySchemes:
    OrbixSession:
      type: apiKey
      in: cookie
      name: PHPSESSID
  schemas:
    OrbixStandardResponseStringData:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          description: "En ContestarJson::enviar, los arrays/objetos suelen llegar codificados como string JSON por compatibilidad."
