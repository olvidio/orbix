              properties:
                id_grupo:
                  type: "integer"
                id_equipaje:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_lista_activ_equipaje":
    post:
      operationId: "post_inventario_equipajes_lista_activ_equipaje"
      summary: "Actividades de un equipaje"
      description: |
        Lista actividades vinculadas al equipaje (`ids_activ` almacenados) para la cabecera de impresión.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_lista_activ_equipaje.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_equipaje"
              properties:
                id_equipaje:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_lista_activ_periodo":
    post:
      operationId: "post_inventario_equipajes_lista_activ_periodo"
      summary: "Actividades por periodo y lugar"
      description: |
        Filtra actividades de un CDC/lugar en un periodo para seleccionar al crear equipaje.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_lista_activ_periodo.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_cdc"
              properties:
                id_cdc:
                  type: "integer"
                periodo:
                  type: "string"
                year:
                  type: "integer"
                empiezamin:
                  type: "string"
                empiezamax:
                  type: "string"
                inicio:
                  type: "string"
                fin:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_lista_activ_sel":
    post:
      operationId: "post_inventario_equipajes_lista_activ_sel"
      summary: "Datos iniciales nuevo equipaje"
      description: |
        Devuelve contexto (nombre ubi, fechas, ids actividades) tras elegir actividades al crear equipaje.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_lista_activ_sel.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_cdc:
                  type: "integer"
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
