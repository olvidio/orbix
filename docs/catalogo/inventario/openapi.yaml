openapi: "3.1.0"
info:
  title: "Orbix API - inventario"
  version: "0.1.0"
  description: |
    OpenAPI generado desde `docs/catalogo`. Revisar obligatoriedad de campos y ejemplos antes de publicarlo como contrato estable.
  license:
    name: "Proprietary"
    identifier: "LicenseRef-Proprietary"
servers:
  - url: "/"
security:
  - OrbixSession: []
paths:
  "/src/inventario/cabecera_pie_txt":
    post:
      operationId: "post_inventario_cabecera_pie_txt"
      summary: "Cabecera y pie de impresión de equipajes"
      description: |
        Devuelve los textos de cabecera (A/B), firma y pie para imprimir equipajes. Prioriza textos propios del equipaje (`id_equipaje`); si faltan, lee defaults de `data/inventario/cabecera_pie_textos.ini`.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/cabecera_pie_txt.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_equipaje:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/cabecera_pie_txt_guardar":
    post:
      operationId: "post_inventario_cabecera_pie_txt_guardar"
      summary: "Guardar textos globales cabecera/pie"
      description: |
        Persiste en `cabecera_pie_textos.ini` los textos por defecto de cabecera, cabecera B, firma y pie para impresión de equipajes.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/cabecera_pie_txt_guardar.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                cabecera:
                  type: "string"
                cabeceraB:
                  type: "string"
                firma:
                  type: "string"
                pie:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/doc_asignar_ctr_guardar":
    post:
      operationId: "post_inventario_doc_asignar_ctr_guardar"
      summary: "Asignar documento a centros"
      description: |
        Crea o actualiza documentos de un tipo en los centros seleccionados (`str_selected_id` JSON). Si el tipo es numerado guarda `num_reg`; si no, `num_ejemplares`. Opcionalmente fija fechas de recepción/asignación.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/doc_asignar_ctr_guardar.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_tipo_doc"
              properties:
                id_tipo_doc:
                  type: "string"
                numerado:
                  type: "string"
                str_selected_id:
                  type: "string"
                f_recibido:
                  type: "string"
                f_asignado:
                  type: "string"
                "num_{id_ubi}":
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/doc_asignar_dlb_guardar":
    post:
      operationId: "post_inventario_doc_asignar_dlb_guardar"
      summary: "Asignar documento a DLB/casa"
      description: |
        Actualiza documentos existentes por lugar (`str_selected_id` JSON de `id_lugar`). Campos dinámicos `num_{id_lugar}`. Requiere documento único por ubi+lugar+tipo.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/doc_asignar_dlb_guardar.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_tipo_doc"
              properties:
                id_tipo_doc:
                  type: "string"
                numerado:
                  type: "string"
                str_selected_id:
                  type: "string"
                f_recibido:
                  type: "string"
                f_asignado:
                  type: "string"
                "num_{id_lugar}":
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/documentos_guardar":
    post:
      operationId: "post_inventario_documentos_guardar"
      summary: "Actualización masiva de documentos"
      description: |
        Actualiza en lote documentos identificados en `documentos` (claves base64 con JSON `{id_doc}` separadas por `#`). Solo modifica campos cuyo checkbox `chk_*` viene activo: fechas recibido/asignado/eliminado, flag eliminado, rango num_ini/num_fin.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/documentos_guardar.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "documentos"
              properties:
                documentos:
                  type: "string"
                chk_f_recibido:
                  type: "string"
                f_recibido:
                  type: "string"
                chk_f_asignado:
                  type: "string"
                f_asignado:
                  type: "string"
                chk_eliminado:
                  type: "string"
                eliminado:
                  type: "integer"
                chk_f_eliminado:
                  type: "string"
                f_eliminado:
                  type: "string"
                chk_num_ini:
                  type: "string"
                num_ini:
                  type: "string"
                chk_num_fin:
                  type: "string"
                num_fin:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_add_doc":
    post:
      operationId: "post_inventario_equipajes_add_doc"
      summary: "Añadir documento a maleta (EGM)"
      description: |
        Asocia un documento libre a un item EGM (`id_item_egm`) creando registro Whereis.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_add_doc.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_item_egm"
              properties:
                id_item_egm:
                  type: "integer"
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_del_doc":
    post:
      operationId: "post_inventario_equipajes_del_doc"
      summary: "Quitar documento de maleta"
      description: |
        Elimina la asociación Whereis entre documento(s) seleccionados y el item EGM.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_del_doc.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_item_egm"
              properties:
                id_item_egm:
                  type: "integer"
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_doc_casa":
    post:
      operationId: "post_inventario_equipajes_doc_casa"
      summary: "Documentos por casa en equipaje"
      description: |
        Lista documentos agrupados por casa/centro para un equipaje (`id_equipaje`), usado en impresión.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_doc_casa.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_equipaje"
              properties:
                id_equipaje:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_egm":
    post:
      operationId: "post_inventario_equipajes_egm"
      summary: "Estructura EGM de un equipaje"
      description: |
        Devuelve grupos/maletas (EGM) del equipaje con sus documentos asociados para edición o impresión.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_egm.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_equipaje"
              properties:
                id_equipaje:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_eliminar":
    post:
      operationId: "post_inventario_equipajes_eliminar"
      summary: "Eliminar equipaje"
      description: |
        Borra un equipaje por `id_equipaje` vía caso de uso `EquipajeEliminar`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_eliminar.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_equipaje"
              properties:
                id_equipaje:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_eliminar_grupo":
    post:
      operationId: "post_inventario_equipajes_eliminar_grupo"
      summary: "Eliminar grupo/maleta de equipaje"
      description: |
        Elimina un grupo EGM (`id_grupo`) de un equipaje.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_eliminar_grupo.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_grupo"
