  "/src/inventario/equipajes_movimientos":
    post:
      operationId: "post_inventario_equipajes_movimientos"
      summary: "Movimientos de documentos entre equipajes"
      description: |
        Compara documentos en maletas de equipajes seleccionados y devuelve entradas/salidas por tipo doc y lugar.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_movimientos.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "sel"
              properties:
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_nuevo_guardar":
    post:
      operationId: "post_inventario_equipajes_nuevo_guardar"
      summary: "Crear equipaje"
      description: |
        Alta de equipaje con nombre, fechas, lugar, ubi de actividades e ids de actividades seleccionadas.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_nuevo_guardar.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "nom_equipaje"
              properties:
                id_ubi_activ:
                  type: "integer"
                nom_equipaje:
                  type: "string"
                ids_activ:
                  type: "string"
                f_ini:
                  type: "string"
                f_fin:
                  type: "string"
                lugar:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_texto_listado_guardar":
    post:
      operationId: "post_inventario_equipajes_texto_listado_guardar"
      summary: "Guardar textos de listado en equipaje"
      description: |
        Persiste textos editables (cabecera, pie, listado por grupo) según `loc` (`cabecera`, `pie`, `docs_grupo_{id}`…).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_texto_listado_guardar.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "loc"
                - "id_equipaje"
              properties:
                texto:
                  type: "string"
                loc:
                  type: "string"
                id_equipaje:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/equipajes_update_grupo":
    post:
      operationId: "post_inventario_equipajes_update_grupo"
      summary: "Crear grupo y asignar documentos"
      description: |
        Crea item EGM en grupo/lugar si no existe y asocia documentos (`sel`) vía Whereis. Devuelve `id_item_egm` creado.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/equipajes_update_grupo.md`
      tags:
        - "inventario"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_equipaje"
                - "id_grupo"
                - "id_lugar"
              properties:
                id_grupo:
                  type: "integer"
                id_equipaje:
                  type: "integer"
                id_lugar:
                  type: "integer"
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/inventario/inventario_css_inline_data":
    post:
      operationId: "post_inventario_inventario_css_inline_data"
      summary: "CSS embebido para impresión"
      description: |
        Lee `inventario.css.php` del disco y devuelve el CSS inline para vistas de impresión de inventario.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/inventario/api/inventario_css_inline_data.md`
      tags:
        - "inventario"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
