paths:
  "/src/planning/planning_casa_que_data":
    post:
      operationId: "post_planning_planning_casa_que_data"
      summary: "Planning Casa Que Data"
      description: |
        Filtro y modo del selector `CasasQue` para `planning_casa_que`, según rol y permisos del usuario (sin depender de `Role`/`PauType` en el frontend).
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/planning/api/planning_casa_que_data.md`
      tags:
        - "planning"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/planning/planning_casa_ver_data":
    post:
      operationId: "post_planning_planning_casa_ver_data"
      summary: "Planning Casa Ver Data"
      description: |
        Actividades agrupadas por casa y periodos de ocupación para renderizar el calendario de `planning_casa_ver`.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/planning/api/planning_casa_ver_data.md`
      tags:
        - "planning"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "post.f_ini_iso"
                - "post.f_fin_iso"
              properties:
                cdc_sel:
                  type: "integer"
                f_fin_iso:
                  type: "string"
                f_ini_iso:
                  type: "string"
                sSeleccionados:
                  type: "string"
                sin_activ:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/planning/planning_ctr_select_data":
    post:
      operationId: "post_planning_planning_ctr_select_data"
      summary: "Planning Ctr Select Data"
      description: |
        Personas y actividades agrupadas por centro para el calendario de `planning_ctr_select`.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/planning/api/planning_ctr_select_data.md`
      tags:
        - "planning"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                ctr:
                  type: "string"
                empiezamax:
                  type: "string"
                empiezamin:
                  type: "string"
                periodo:
                  type: "string"
                sacd:
                  type: "string"
                todos_agd:
                  type: "string"
                todos_n:
                  type: "string"
                todos_s:
                  type: "string"
                year:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/planning/planning_persona_select_data":
    post:
      operationId: "post_planning_planning_persona_select_data"
      summary: "Planning Persona Select Data"
      description: |
        Listado de personas que cumplen los filtros del formulario `planning_persona_que`.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/planning/api/planning_persona_select_data.md`
      tags:
        - "planning"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                apellido1:
                  type: "string"
                apellido2:
                  type: "string"
                centro:
                  type: "string"
                na:
                  type: "string"
                nombre:
                  type: "string"
                obj_pau:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/planning/planning_persona_ver_data":
    post:
      operationId: "post_planning_planning_persona_ver_data"
      summary: "Planning Persona Ver Data"
      description: |
        Actividades de un conjunto de personas para el calendario de `planning_persona_ver`.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/planning/api/planning_persona_ver_data.md`
      tags:
        - "planning"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                empiezamax:
                  type: "string"
                empiezamin:
                  type: "string"
                obj_pau:
                  type: "string"
                periodo:
                  type: "string"
                sel:
                  type: "array"
                  items:
                    type: string
                sSeleccionados:
                  type: "string"
                year:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/planning/planning_zones_que_data":
    post:
      operationId: "post_planning_planning_zones_que_data"
      summary: "Planning Zones Que Data"
      description: |
        Opciones del desplegable de zonas SACD y comprobación de permiso para `planning_zones_que`.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/planning/api/planning_zones_que_data.md`
      tags:
