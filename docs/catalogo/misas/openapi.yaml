  "/src/misas/guardar_encargo_centro":
    post:
      operationId: "post_misas_guardar_encargo_centro"
      summary: "Guardar Encargo Centro"
      description: |
        Inserta o actualiza un `EncargoCtr` (relacion encargo ↔ centro). - Si `id_item` esta vacio se crea un nuevo `EncargoCtr` con uuid v4. - Si `id_item` es un uuid valido se carga el existente y se modifica. Devuelve texto vacio si todo fue bien, o el mensaje de error del repositorio en caso contrario.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/misas/api/guardar_encargo_centro.md`
      tags:
        - "misas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_ctr:
                  type: "integer"
                id_enc:
                  type: "integer"
                id_item:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
