  "/src/misas/cuadricula_update":
    post:
      operationId: "post_misas_cuadricula_update"
      summary: "Cuadricula Update"
      description: |
        Use case del endpoint `cuadricula_update` (migracion de `apps/misas/controller/cuadricula_update.php` al Slice 6a). Hace dos cosas en la misma transaccion logica: 1. Upsert / delete de un `EncargoDia` para un dia + encargo concretos, en funcion de `key` (si esta vacio, se borra; si trae `id_nom`, se guarda o actualiza). 2. Recalcula el bloque `meta` que la UI usa para pintar colores y textos (disponibilidad del sacd anterior y del nuevo, numero de misas del dia, conflictos con primera hora, etc.). El codigo es una traduccion casi literal del controlador original para minimizar riesgo de regresion: la logica de negocio en si no cambia en este slice; lo unico que cambia es donde vive.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/misas/api/cuadricula_update.md`
      tags:
        - "misas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dia:
                  type: "string"
                id_enc:
                  type: "integer"
                id_zona:
                  type: "integer"
                key:
                  type: "string"
                observ:
                  type: "string"
                tend:
                  type: "string"
                tipo_plantilla:
                  type: "string"
                tstart:
                  type: "string"
                uuid_item:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/misas_CuadriculaUpdateDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/misas_CuadriculaUpdateDataResponse"
  "/src/misas/desplegable_encargos":
    post:
      operationId: "post_misas_desplegable_encargos"
      summary: "Desplegable Encargos"
      description: |
        Payload JSON para el desplegable dinamico de encargos de una zona. Sigue el contrato de desplegables de `refactor.md`: - `id` : id del `<select>` que montara `fnjs_construir_desplegable`. - `opciones` : map id_enc => desc_enc de los encargos con `id_tipo_enc >= 8100` de la zona. - `selected` : id_enc preseleccionado (`''` si no aplica). - `blanco` : true si se quiere opcion en blanco. - `val_blanco`: valor de la opcion en blanco. - `action` : handler `onchange` opcional (vacio por defecto).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/misas/api/desplegable_encargos.md`
      tags:
        - "misas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_enc:
                  type: "string"
                id_zona:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
