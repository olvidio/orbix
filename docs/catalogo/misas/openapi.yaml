  "/src/misas/guardar_encargo_zona":
    post:
      operationId: "post_misas_guardar_encargo_zona"
      summary: "Guardar Encargo Zona"
      description: |
        Inserta o actualiza un `Encargo` del grupo `ZONAS_MISAS`. - Si `id_enc` es 0 se crea uno nuevo con `getNewId()`. - Si hay valor, se carga el existente y se modifica. Devuelve un array con: - `error`: texto vacio si todo fue bien, mensaje del repositorio si no. - `data` : payload para el frontend con `id_enc`, `lugar` y el nombre del centro si se resolvio.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/misas/api/guardar_encargo_zona.md`
      tags:
        - "misas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                descripcion_lugar:
                  type: "string"
                encargo:
                  type: "string"
                id_enc:
                  type: "integer"
                id_tipo_enc:
                  type: "integer"
                id_ubi:
                  type: "integer"
                id_zona:
                  type: "integer"
                idioma_enc:
                  type: "string"
                observ:
                  type: "string"
                orden:
                  type: "integer"
                prioridad:
                  type: "integer"
      responses:
        "200":
