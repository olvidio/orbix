paths:
  "/src/asignaturas/asignaturas_con_separador_data":
    post:
      operationId: "post_asignaturas_asignaturas_con_separador_data"
      summary: "Asignaturas Con Separador Data"
      description: |
        Devuelve el mapa `id_asignatura => nombre_asignatura` de las asignaturas activas, ordenado por grupo (`op`) y nombre, para poblar un desplegable de selección de asignatura.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/asignaturas/api/asignaturas_con_separador_data.md`
      tags:
        - "asignaturas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                op_genericas:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/asignaturas_AsignaturasConSeparadorOpcionesDataDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/asignaturas_AsignaturasConSeparadorOpcionesDataDataResponse"
  "/src/asignaturas/asignaturas_map_data":
    post:
      operationId: "post_asignaturas_asignaturas_map_data"
      summary: "Asignaturas Map Data"
      description: |
        Devuelve el mapa `id_asignatura => nombre_corto` de todas las asignaturas, pensado para pantallas que necesitan la correspondencia id→nombre sin montar el contenedor de asignaturas en frontend.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/asignaturas/api/asignaturas_map_data.md`
      tags:
        - "asignaturas"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/asignaturas_AsignaturasMapDataDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/asignaturas_AsignaturasMapDataDataResponse"
