openapi: "3.1.0"
info:
  title: "Orbix API - dbextern"
  version: "0.1.0"
  description: |
    OpenAPI generado desde `docs/catalogo`. Revisar obligatoriedad de campos y ejemplos antes de publicarlo como contrato estable.
  license:
    name: "Proprietary"
    identifier: "LicenseRef-Proprietary"
servers:
  - url: "/"
security:
  - OrbixSession: []
paths:
  "/src/dbextern/refrescar_bdu":
    post:
      operationId: "post_dbextern_refrescar_bdu"
      summary: "Refrescar Bdu"
      description: |
        Recrea la tabla temporal `tmp_bdu` copiando datos actuales de la BDU (operación larga, ~2–3 min).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/refrescar_bdu.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                que:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/sincro_baja":
    post:
      operationId: "post_dbextern_sincro_baja"
      summary: "Sincro Baja"
      description: |
        Da de baja (situación `B`) una persona Aquinate cuya correspondencia BDU desapareció (punto 8).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/sincro_baja.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dl:
                  type: "string"
                id_nom_orbix:
                  type: "integer"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/sincro_crear":
    post:
      operationId: "post_dbextern_sincro_crear"
      summary: "Sincro Crear"
      description: |
        Alta de persona en Aquinate a partir de ficha BDU y creación del `id_match` (punto 4).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/sincro_crear.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id:
                  type: "integer"
                id_nom_listas:
                  type: "integer"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/sincro_crear_todos":
    post:
      operationId: "post_dbextern_sincro_crear_todos"
      summary: "Sincro Crear Todos"
      description: |
        Crea en bloque todas las personas BDU de la DL sin `id_match` (acción «crear todos» en punto 4).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/sincro_crear_todos.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dl:
                  type: "string"
                region:
                  type: "string"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/sincro_desunir":
    post:
      operationId: "post_dbextern_sincro_desunir"
      summary: "Sincro Desunir"
      description: |
        Elimina el vínculo `id_match` de una persona BDU (punto 3 del dashboard).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/sincro_desunir.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_nom_listas:
                  type: "integer"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/sincro_index_datos":
    post:
      operationId: "post_dbextern_sincro_index_datos"
      summary: "Sincro Index Datos"
      description: |
        Bootstrap del dashboard de sincronización BDU↔Aquinate: calcula los contadores de las 9 situaciones (puntos 1–4 en BDU, 7–9 en Aquinate) y devuelve los `link_spec_*` para abrir cada subpantalla.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/sincro_index_datos.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                tipo:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/sincro_syncro":
    post:
      operationId: "post_dbextern_sincro_syncro"
      summary: "Sincro Syncro"
      description: |
        Sincroniza (punto 1) todas las personas BDU ya unidas a Aquinate en la DL actual.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/sincro_syncro.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dl_listas:
                  type: "string"
                region:
                  type: "string"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/sincro_trasladar":
    post:
      operationId: "post_dbextern_sincro_trasladar"
      summary: "Sincro Trasladar"
      description: |
        Traslada a esta DL una persona que está activa en otra DL Orbix (punto 2).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/sincro_trasladar.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dl:
                  type: "string"
                id_nom_orbix:
                  type: "integer"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/sincro_trasladar_a":
    post:
      operationId: "post_dbextern_sincro_trasladar_a"
      summary: "Sincro Trasladar A"
      description: |
        Traslada una persona Aquinate activa hacia la DL donde está su correspondencia BDU (punto 7).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/sincro_trasladar_a.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dl:
                  type: "string"
                id_nom_orbix:
                  type: "integer"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/sincro_unir":
    post:
      operationId: "post_dbextern_sincro_unir"
      summary: "Sincro Unir"
      description: |
        Crea el vínculo `id_match` entre una persona BDU (`id_nom_listas`) y una Orbix (`id_orbix`).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/sincro_unir.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id:
                  type: "integer"
                id_nom_listas:
                  type: "integer"
                id_orbix:
                  type: "integer"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/ver_desaparecidos_de_listas_datos":
    post:
      operationId: "post_dbextern_ver_desaparecidos_de_listas_datos"
      summary: "Ver Desaparecidos De Listas Datos"
      description: |
        Detalle del punto 8: personas Aquinate con `id_match` cuya ficha BDU ya no existe o está vacía.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/ver_desaparecidos_de_listas_datos.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                ids_desaparecidos_de_listas:
                  type: "string"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/ver_desaparecidos_de_orbix_datos":
    post:
      operationId: "post_dbextern_ver_desaparecidos_de_orbix_datos"
      summary: "Ver Desaparecidos De Orbix Datos"
      description: |
        Detalle del punto 3: personas en BDU con `id_match` pero sin ficha activa en Aquinate de esta DL.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/ver_desaparecidos_de_orbix_datos.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                ids_desaparecidos_de_orbix:
                  type: "string"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/ver_listas_datos":
    post:
      operationId: "post_dbextern_ver_listas_datos"
      summary: "Ver Listas Datos"
      description: |
        Lista personas de la BDU sin correspondencia en Aquinate (punto 4 del dashboard) o busca posibles coincidencias Orbix para una persona concreta.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/ver_listas_datos.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dl:
                  type: "string"
                first_load:
                  type: "boolean"
                id_nom_bdu:
                  type: "integer"
                region:
                  type: "string"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/ver_orbix_datos":
    post:
      operationId: "post_dbextern_ver_orbix_datos"
      summary: "Ver Orbix Datos"
      description: |
        Lista personas Aquinate activas sin correspondencia en BDU (punto 9) o busca candidatos BDU para unir.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/ver_orbix_datos.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                dl:
                  type: "string"
                id_nom_orbix:
                  type: "integer"
                region:
                  type: "string"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/ver_orbix_otradl_datos":
    post:
      operationId: "post_dbextern_ver_orbix_otradl_datos"
      summary: "Ver Orbix Otradl Datos"
      description: |
        Detalle del punto 7: personas Aquinate activas cuya correspondencia BDU está en otra DL.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/ver_orbix_otradl_datos.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                ids_traslados_A:
                  type: "string"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/dbextern/ver_traslados_datos":
    post:
      operationId: "post_dbextern_ver_traslados_datos"
      summary: "Ver Traslados Datos"
      description: |
        Detalle del punto 2 del dashboard: personas unidas a BDU pero situadas en otra DL en Orbix.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/dbextern/api/ver_traslados_datos.md`
      tags:
        - "dbextern"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                ids_traslados:
                  type: "string"
                tipo_persona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
components:
  securitySchemes:
    OrbixSession:
      type: apiKey
      in: cookie
      name: PHPSESSID
  schemas:
    OrbixStandardResponseStringData:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          description: "En ContestarJson::enviar, los arrays/objetos suelen llegar codificados como string JSON por compatibilidad."
