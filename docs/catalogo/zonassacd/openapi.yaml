openapi: "3.1.0"
info:
  title: "Orbix API - zonassacd"
  version: "0.1.0"
  description: |
    OpenAPI generado desde `docs/catalogo`. Revisar obligatoriedad de campos y ejemplos antes de publicarlo como contrato estable.
  license:
    name: "Proprietary"
    identifier: "LicenseRef-Proprietary"
servers:
  - url: "/"
security:
  - OrbixSession: []
paths:
  "/src/zonassacd/zona_ctr":
    post:
      operationId: "post_zonassacd_zona_ctr"
      summary: "Zona Ctr"
      description: |
        Datos iniciales de Zonas-ctr: desplegable de zonas y perm_des (activa opción no_sf, checkboxes y botón asignar).
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/zonassacd/api/zona_ctr.md`
      tags:
        - "zonassacd"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/zonassacd_ZonaCtrPageDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/zonassacd_ZonaCtrPageDataResponse"
  "/src/zonassacd/zona_ctr_ajax":
    post:
      operationId: "post_zonassacd_zona_ctr_ajax"
      summary: "Zona Ctr Ajax"
      description: |
        Ruta muerta: registrada en routes.php pero sin controller. Sustituida por zona_ctr_lista y zona_ctr_update.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/zonassacd/api/zona_ctr_ajax.md`
      tags:
        - "zonassacd"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/zonassacd/zona_ctr_lista":
    post:
      operationId: "post_zonassacd_zona_ctr_lista"
      summary: "Zona Ctr Lista"
      description: |
        Centros activos de una zona (id numérico), sin zona dl (no) o sin zona sf (no_sf). Centros sf solo visibles con perm_des.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/zonassacd/api/zona_ctr_lista.md`
      tags:
        - "zonassacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_zona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/zonassacd/zona_ctr_update":
    post:
      operationId: "post_zonassacd_zona_ctr_update"
      summary: "Zona Ctr Update"
      description: |
        Reasigna centros marcados (sel=id_ubi) a id_zona_new. Primer dígito del id_ubi elige repo dl (1) o sf. id_zona_new=no deja sin zona.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/zonassacd/api/zona_ctr_update.md`
      tags:
        - "zonassacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_zona_new:
                  type: "string"
                sel:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/zonassacd/zona_sacd":
    post:
      operationId: "post_zonassacd_zona_sacd"
      summary: "Zona Sacd"
      description: |
        Datos iniciales de la pantalla Zonas-sacd: opciones del desplegable de zonas y flag perm_des que activa checkboxes, botones de asignación y modal de días.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/zonassacd/api/zona_sacd.md`
      tags:
        - "zonassacd"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/zonassacd_ZonaSacdPageDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/zonassacd_ZonaSacdPageDataResponse"
  "/src/zonassacd/zona_sacd_ajax":
    post:
      operationId: "post_zonassacd_zona_sacd_ajax"
      summary: "Zona Sacd Ajax"
      description: |
        Ruta muerta: registrada en routes.php pero el controller no existe. Era dispatcher legacy (que=get_lista|update|get_lista_tot), sustituido por zona_sacd_lista, zona_sacd_update y zona_sacd_lista_tot.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/zonassacd/api/zona_sacd_ajax.md`
      tags:
        - "zonassacd"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/zonassacd/zona_sacd_lista":
    post:
      operationId: "post_zonassacd_zona_sacd_lista"
      summary: "Zona Sacd Lista"
      description: |
        Tabla de sacd de una zona (id_zona numérico), sacd sin zona (id_zona=no) o vacía si id_zona inválido. Columnas propia y días L–D como x/-.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/zonassacd/api/zona_sacd_lista.md`
      tags:
        - "zonassacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_zona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/zonassacd/zona_sacd_lista_tot":
    post:
      operationId: "post_zonassacd_zona_sacd_lista_tot"
      summary: "Zona Sacd Lista Tot"
      description: |
        Listado global de todos los sacd de la delegación con sus zonas (zona propia primero). Sacd sin zona aparece con zona vacía.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/zonassacd/api/zona_sacd_lista_tot.md`
      tags:
        - "zonassacd"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/zonassacd/zona_sacd_update":
    post:
      operationId: "post_zonassacd_zona_sacd_update"
      summary: "Zona Sacd Update"
      description: |
        Mueve, crea o elimina asignaciones sacd↔zona para sel[]. acumular=1 cambia zona propia; acumular=2 añade/quita asignación iglesia/cgi no propia. id_zona_new=no elimina; vacío no hace nada.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/zonassacd/api/zona_sacd_update.md`
      tags:
        - "zonassacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                acumular:
                  type: "integer"
                id_zona:
                  type: "string"
                id_zona_new:
                  type: "string"
                sel:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
components:
  securitySchemes:
    OrbixSession:
      type: apiKey
      in: cookie
      name: PHPSESSID
  schemas:
    OrbixStandardResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          description: "Ver schema concreto de cada operacion."
    zonassacd_ZonaCtrPageData:
      type: object
      properties:
        a_opciones:
          type: array
          items: {}
        perm_des:
          type: "boolean"
    zonassacd_ZonaCtrPageDataResponse:
      allOf:
        - $ref: "#/components/schemas/OrbixStandardResponseEnvelope"
        - type: object
          properties:
            data:
              oneOf:
                - type: string
                  description: "JSON codificado como string (compatibilidad legacy)."
                - $ref: "#/components/schemas/zonassacd_ZonaCtrPageData"
    zonassacd_ZonaSacdPageData:
      type: object
      properties:
        a_opciones:
          type: array
          items: {}
        perm_des:
          type: "boolean"
    zonassacd_ZonaSacdPageDataResponse:
      allOf:
        - $ref: "#/components/schemas/OrbixStandardResponseEnvelope"
        - type: object
          properties:
            data:
              oneOf:
                - type: string
                  description: "JSON codificado como string (compatibilidad legacy)."
                - $ref: "#/components/schemas/zonassacd_ZonaSacdPageData"
    OrbixStandardResponseStringData:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          description: "En ContestarJson::enviar, los arrays/objetos suelen llegar codificados como string JSON por compatibilidad."
