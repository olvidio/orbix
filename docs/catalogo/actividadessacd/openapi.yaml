          type: "string"
    actividadessacd_TextoComunicacionDataDataResponse:
      allOf:
        - $ref: "#/components/schemas/OrbixStandardResponseEnvelope"
        - type: object
          properties:
            data:
              oneOf:
                - type: string
                  description: "JSON codificado como string (compatibilidad legacy)."
                - $ref: "#/components/schemas/actividadessacd_TextoComunicacionDataData"
    OrbixStandardResponseStringData:
      type: object
      required:
