      operationId: "post_actividadessacd_sacds_encargados_data"
      summary: "Sacds Encargados Data"
      description: |
        Endpoint backend: devuelve los sacd encargados actuales de una actividad en un array serializable, junto con los flags de permiso.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/actividadessacd/api/sacds_encargados_data.md`
      tags:
