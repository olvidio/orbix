  "/src/actividadessacd/lista_actividades_sacd_data":
    post:
      operationId: "post_actividadessacd_lista_actividades_sacd_data"
      summary: "Lista Actividades Sacd Data"
      description: |
        Endpoint backend: devuelve el listado de actividades del tipo + periodo elegidos junto con los sacd encargados y los flags de permiso.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/actividadessacd/api/lista_actividades_sacd_data.md`
