  "/src/actividadessacd/comunicacion_activ_sacd_data":
    post:
      operationId: "post_actividadessacd_comunicacion_activ_sacd_data"
      summary: "Comunicacion Activ Sacd Data"
      description: |
        Listado de **atención de actividades** para comunicar a los SACD (principal + «sacd de paso» cuando aplica). Equivalente al botón «buscar» de la web.
        
        Operacion: `consulta`.
        
        Fuente catalogo: `docs/catalogo/actividadessacd/api/comunicacion_activ_sacd_data.md`
      tags:
        - "actividadessacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "periodo"
                - "year"
              properties:
                empiezamax:
                  type: "string"
                empiezamin:
                  type: "string"
                id_nom:
                  type: "integer"
                periodo:
                  type: "string"
                propuesta:
                  type: "string"
                que:
                  type: "string"
                sacd:
                  type: "string"
                sel:
                  type: "string"
                year:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/actividadessacd_ComunicacionActividadesSacdDataDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
