  "/src/actividadessacd/sacd_eliminar":
    post:
      operationId: "post_actividadessacd_sacd_eliminar"
      summary: "Sacd Eliminar"
      description: |
        Endpoint backend: elimina el sacd ({id_activ, id_cargo}) de una actividad y la asistencia asociada.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/actividadessacd/api/sacd_eliminar.md`
      tags:
        - "actividadessacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_activ"
                - "id_cargo"
              properties:
                id_activ:
                  type: "integer"
                id_cargo:
                  type: "integer"
                id_nom:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
