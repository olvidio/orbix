      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          description: "Ver schema concreto de cada operacion."
    actividadessacd_ComunicacionActividadesSacdDataData:
      type: object
      properties:
        que:
          type: "string"
        propuesta:
          type: "string"
        mi_dele:
          type: "string"
        lugar_fecha:
          type: "string"
        periodo_txt:
          type: "string"
        "mensaje_periodo?":
          type: "string"
        sacds:
          type: array
          items: {}
        sacds_paso:
          type: array
          items: {}
    actividadessacd_ComunicacionActividadesSacdDataDataResponse:
      allOf:
        - $ref: "#/components/schemas/OrbixStandardResponseEnvelope"
        - type: object
          properties:
            data:
              oneOf:
                - type: string
                  description: "JSON codificado como string (compatibilidad legacy)."
                - $ref: "#/components/schemas/actividadessacd_ComunicacionActividadesSacdDataData"
    actividadessacd_ListaActividadesSacdDataData:
      type: object
      properties:
        "0":
          type: "string"
    actividadessacd_ListaActividadesSacdDataDataResponse:
      allOf:
        - $ref: "#/components/schemas/OrbixStandardResponseEnvelope"
        - type: object
          properties:
            data:
              oneOf:
