    post:
      operationId: "post_actividadessacd_sacds_disponibles_data"
      summary: "Sacds Disponibles Data"
      description: |
        Endpoint backend: devuelve los sacd candidatos para asignar a una actividad (sacd del centro encargado + sacd globales segun bitmask `seleccion`).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/actividadessacd/api/sacds_disponibles_data.md`
      tags:
