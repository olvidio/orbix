    post:
      operationId: "post_actividadessacd_sacd_asignar_auto"
      summary: "Sacd Asignar Auto"
      description: |
        Endpoint backend: auto-asignacion masiva del sacd titular del centro encargado a actividades sr/sg sin sacd.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/actividadessacd/api/sacd_asignar_auto.md`
