    post:
      operationId: "post_actividadessacd_comunicacion_activ_sacd_enviar"
      summary: "Comunicacion Activ Sacd Enviar"
      description: |
        Endpoint backend: encola los mails de comunicacion de actividades a los sacd y al ctr del sacd, con copia al jefe de calendario.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/actividadessacd/api/comunicacion_activ_sacd_enviar.md`
      tags:
