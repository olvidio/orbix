                  description: "JSON codificado como string (compatibilidad legacy)."
                - $ref: "#/components/schemas/actividadessacd_ListaActividadesSacdDataData"
    actividadessacd_LocalesDesplegableDataData:
      type: object
      properties:
        a_locales:
          type: array
          items: {}
    actividadessacd_LocalesDesplegableDataDataResponse:
      allOf:
        - $ref: "#/components/schemas/OrbixStandardResponseEnvelope"
        - type: object
          properties:
            data:
              oneOf:
                - type: string
                  description: "JSON codificado como string (compatibilidad legacy)."
