  "/src/actividadessacd/sacd_asignar":
    post:
      operationId: "post_actividadessacd_sacd_asignar"
      summary: "Sacd Asignar"
      description: |
        Endpoint backend: asigna un sacd a una actividad (y, si es sv, tambien crea la asistencia).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/actividadessacd/api/sacd_asignar.md`
      tags:
        - "actividadessacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_activ"
                - "id_nom"
              properties:
                id_activ:
                  type: "integer"
                id_nom:
                  type: "integer"
      responses:
        "200":
