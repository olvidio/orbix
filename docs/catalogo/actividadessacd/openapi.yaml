  "/src/actividadessacd/sacd_reordenar":
    post:
      operationId: "post_actividadessacd_sacd_reordenar"
      summary: "Sacd Reordenar"
      description: |
        Endpoint backend: reordena un sacd dentro de una actividad (mas / menos prioridad).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/actividadessacd/api/sacd_reordenar.md`
      tags:
        - "actividadessacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_activ"
                - "id_nom"
              properties:
                id_activ:
                  type: "integer"
                id_nom:
                  type: "integer"
                num_orden:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
