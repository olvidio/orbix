openapi: "3.1.0"
info:
  title: "Orbix API - usuarios"
  version: "0.1.0"
  description: |
    OpenAPI generado desde `docs/catalogo`. Revisar obligatoriedad de campos y ejemplos antes de publicarlo como contrato estable.
  license:
    name: "Proprietary"
    identifier: "LicenseRef-Proprietary"
servers:
  - url: "/"
security:
  - OrbixSession: []
paths:
  "/src/usuarios/app_login":
    post:
      operationId: "post_usuarios_app_login"
      summary: "App Login"
      description: |
        Login JSON para app móvil: valida credenciales (y 2FA si aplica), establece sesión PHP y devuelve payload con códigos de estado.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/usuarios/api/app_login.md`
      tags:
        - "usuarios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "username"
                - "password"
              properties:
                username:
                  type: "string"
                password:
                  type: "string"
                esquema:
                  type: "string"
                verification_code:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/usuarios_AppMobileLoginDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/usuarios_AppMobileLoginDataResponse"
  "/src/usuarios/app_session":
    post:
      operationId: "post_usuarios_app_session"
      summary: "App Session"
      description: |
        Comprueba si hay sesión autenticada al arrancar la app móvil (sin credenciales).
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/usuarios/api/app_session.md`
      tags:
        - "usuarios"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/usuarios/borrar_pwd":
