components:
  securitySchemes:
    OrbixSession:
      type: apiKey
      in: cookie
      name: PHPSESSID
  schemas:
    OrbixStandardResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          description: "Ver schema concreto de cada operacion."
    usuarios_AppMobileLoginData:
      type: object
      properties:
        id_usuario:
          type: "integer"
        username:
          type: "string"
        esquema:
          type: "string"
        require_password_change:
          type: "boolean"
    usuarios_AppMobileLoginDataResponse:
      allOf:
        - $ref: "#/components/schemas/OrbixStandardResponseEnvelope"
        - type: object
          properties:
            data:
              oneOf:
                - type: string
                  description: "JSON codificado como string (compatibilidad legacy)."
                - $ref: "#/components/schemas/usuarios_AppMobileLoginData"
    OrbixStandardResponseStringData:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          description: "En ContestarJson::enviar, los arrays/objetos suelen llegar codificados como string JSON por compatibilidad."
    OrbixCustomJsonResponse:
      type: object
      additionalProperties: true
