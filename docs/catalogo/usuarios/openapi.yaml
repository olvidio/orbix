  - OrbixSession: []
paths:
  "/src/usuarios/app_login":
    post:
      operationId: "post_usuarios_app_login"
      summary: "App Login"
      description: |
        Login JSON para clientes móviles (Camino B). Establece `$_SESSION['session_auth']` y cookies (`PHPSESSID`, `esquema`, `idioma`) igual que el login web.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/usuarios/api/app_login.md`
      tags:
        - "usuarios"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "username"
                - "password"
              properties:
                esquema:
                  type: "string"
                password:
                  type: "string"
                username:
                  type: "string"
                verification_code:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/usuarios_AppMobileLoginDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/usuarios_AppMobileLoginDataResponse"
  "/src/usuarios/app_session":
    post:
      operationId: "post_usuarios_app_session"
      summary: "App Session"
      description: |
        Comprueba si la cookie de sesión actual identifica un usuario autenticado. Útil al arrancar la app sin volver a pedir credenciales.
        
        Operacion: `consulta`.
        
        Fuente catalogo: `docs/catalogo/usuarios/api/app_session.md`
