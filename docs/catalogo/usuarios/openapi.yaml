      operationId: "post_usuarios_borrar_pwd"
      summary: "Borrar Pwd"
      description: |
        Herramienta de pruebas: resetea contraseñas al login en todos los esquemas (excepto superadmin id_role=1). Solo WEBDIR=pruebas o Docker.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/usuarios/api/borrar_pwd.md`
      tags:
