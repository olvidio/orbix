openapi: "3.1.0"
info:
  title: "Orbix API - encargossacd"
  version: "0.1.0"
  description: |
    OpenAPI generado desde `docs/catalogo`. Revisar obligatoriedad de campos y ejemplos antes de publicarlo como contrato estable.
  license:
    name: "Proprietary"
    identifier: "LicenseRef-Proprietary"
servers:
  - url: "/"
security:
  - OrbixSession: []
paths:
  "/src/encargossacd/comprobaciones_ctr":
    post:
      operationId: "post_encargossacd_comprobaciones_ctr"
      summary: "Comprobaciones Ctr"
      description: |
        Elimina encargos ligados a centros inactivos y sacd huérfanos (misma lógica que el antiguo `frontend/encargossacd/controller/comprobaciones.php`).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/encargossacd/api/comprobaciones_ctr.md`
      tags:
        - "encargossacd"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/encargossacd_EncargoComprobacionesCtrDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/encargossacd_EncargoComprobacionesCtrDataResponse"
  "/src/encargossacd/ctr_ficha_data":
    post:
      operationId: "post_encargossacd_ctr_ficha_data"
      summary: "Ctr Ficha Data"
      description: |
        Datos de la pantalla `ctr_ficha`: - calcula el `filtro_ctr` efectivo a partir del centro (cuando no viene del POST) - devuelve las `opciones_seccion` para el desplegable de grupo de ctrs. Reemplaza la lectura directa de repos y el acceso a `EncargoAplicacionService` que el frontend hacia en `ctr_ficha.php`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/encargossacd/api/ctr_ficha_data.md`
      tags:
        - "encargossacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                filtro_ctr:
                  type: "string"
                id_ubi:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/encargossacd_CtrFichaDataDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/encargossacd_CtrFichaDataDataResponse"
  "/src/encargossacd/ctr_ficha_update":
    post:
      operationId: "post_encargossacd_ctr_ficha_update"
      summary: "Ctr Ficha Update"
      description: |
        Mutacion de la ficha de atencion sacerdotal de un centro. Puerto de `frontend/encargossacd/controller/ctr_ficha_update.php`. Devuelve siempre `['error' => string]` (vacio = exito). El controlador HTTP convierte ese resultado en JSON `{success, mensaje}` (el proxy legacy en `frontend/` preserva el contrato "alert(rta_txt)" reemitiendo `mensaje`).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/encargossacd/api/ctr_ficha_update.md`
      tags:
        - "encargossacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                cl:
                  type: "string"
                dedic_ctr_m:
                  type: "string"
                dedic_ctr_t:
                  type: "string"
                dedic_ctr_v:
                  type: "string"
                dedic_m:
                  type: "string"
                dedic_t:
                  type: "string"
                dedic_v:
                  type: "string"
                e:
                  type: "integer"
                "id_enc_$e":
                  type: "integer"
                id_sacd:
                  type: "string"
                id_sacd_suplente:
                  type: "integer"
                id_sacd_titular:
                  type: "integer"
                "id_ubi_$e":
                  type: "integer"
                "mod_$e":
                  type: "string"
                n_sacd:
                  type: "integer"
                num_alum:
                  type: "integer"
                observ:
                  type: "string"
                sacd_num:
                  type: "integer"
                "tipo_centro_$e":
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/encargossacd_CtrFichaUpdateDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/encargossacd_CtrFichaUpdateDataResponse"
  "/src/encargossacd/ctr_get_ficha_data":
    post:
      operationId: "post_encargossacd_ctr_get_ficha_data"
      summary: "Ctr Get Ficha Data"
      description: |
        Lectura de la ficha de atencion sacerdotal de un centro. Puerto del antiguo `frontend/encargossacd/controller/ctr_get_ficha.php`. Devuelve arrays planos/estructurados para que el controlador frontend arme `frontend\shared\web\Desplegable` y la HTML sin instanciar nada de `src\`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/encargossacd/api/ctr_get_ficha_data.md`
      tags:
        - "encargossacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_ubi:
                  type: "string"
                seleccion_sacd:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/encargossacd_CtrGetFichaDataDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/encargossacd_CtrGetFichaDataDataResponse"
  "/src/encargossacd/ctr_get_select_data":
    post:
      operationId: "post_encargossacd_ctr_get_select_data"
      summary: "Ctr Get Select Data"
      description: |
        Payload JSON para el desplegable de centros segun filtro (y zona opcional). Devuelve el contrato estandar definido en `refactor.md` (`id`, `name`, `opciones`, `selected`, `blanco`, `val_blanco`, `action`) para que el frontend monte el `<select>` con `fnjs_construir_desplegable` (o el modelo `frontend/encargossacd/model/DesplCentros`). Importante: esta clase vive en capa `application` y por tanto **no** puede instanciar `frontend\shared\web\Desplegable` (ver `refactor.md`).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/encargossacd/api/ctr_get_select_data.md`
      tags:
        - "encargossacd"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                filtro_ctr:
                  type: "string"
                id_ubi:
                  type: "string"
                id_zona:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/encargossacd_EncargoCtrSelectDataDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/encargossacd_EncargoCtrSelectDataDataResponse"
