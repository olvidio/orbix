    post:
      operationId: "post_devel_db_admin_eliminar_esquema"
      summary: "Eliminar Esquema"
      description: |
        Traslada datos de un esquema DL a «resto», elimina esquemas/roles y limpia ficheros de passwords.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/devel_db_admin/api/eliminar_esquema.md`
      tags:
