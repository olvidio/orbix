components:
  securitySchemes:
    OrbixSession:
      type: apiKey
      in: cookie
      name: PHPSESSID
  schemas:
    OrbixStandardResponseStringData:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          description: "En ContestarJson::enviar, los arrays/objetos suelen llegar codificados como string JSON por compatibilidad."
