      operationId: "post_devel_db_admin_db_lugar"
      summary: "Db Lugar"
      description: |
        Desplegable AJAX de delegaciones (`dl`) filtrado por región.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/devel_db_admin/api/db_lugar.md`
