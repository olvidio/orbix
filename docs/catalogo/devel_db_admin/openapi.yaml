      summary: "Migraciones Ejecutar"
      description: |
        Ejecuta migraciones SQL pendientes desde `db/migrations` y registra el resultado.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/devel_db_admin/api/migraciones_ejecutar.md`
      tags:
