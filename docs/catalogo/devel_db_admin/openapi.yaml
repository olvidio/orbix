      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "esquema_origen"
                - "region"
                - "dl"
              properties:
                comun:
                  type: "integer"
                dl:
                  type: "string"
                esquema:
                  type: "string"
                esquema_origen:
                  type: "string"
                region:
                  type: "string"
                sf:
                  type: "integer"
                sv:
                  type: "integer"
