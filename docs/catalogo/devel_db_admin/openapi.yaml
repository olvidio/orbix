paths:
  "/src/devel_db_admin/absorber_esquema":
    post:
      operationId: "post_devel_db_admin_absorber_esquema"
      summary: "Absorber Esquema"
      description: |
        Absorbe un esquema DL (origen) en otro esquema matriz: copia tablas en comun/sv/sv-e, actualiza referencias de delegación, desactiva la delegación origen y renombra el esquema disuelto a `zz…`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/devel_db_admin/api/absorber_esquema.md`
      tags:
        - "devel_db_admin"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "esquema_matriz"
                - "esquema_del"
              properties:
                esquema_del:
                  type: "string"
                esquema_matriz:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/devel_db_admin/apptables_apps_data":
    post:
      operationId: "post_devel_db_admin_apptables_apps_data"
      summary: "Apptables Apps Data"
      description: |
        Mapa de aplicaciones instaladas para el formulario de gestión de tablas (`apptables`).
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/devel_db_admin/api/apptables_apps_data.md`
      tags:
        - "devel_db_admin"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/devel_db_admin/apptables_update":
    post:
      operationId: "post_devel_db_admin_apptables_update"
      summary: "Apptables Update"
      description: |
        Crea, elimina o rellena tablas globales o de esquema invocando las clases `DB`/`DBEsquema` del módulo de aplicación seleccionado.
        
        Requiere cápsula HashB en `` (accion ``).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/devel_db_admin/api/apptables_update.md`
      tags:
        - "devel_db_admin"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_app"
                - "accion"
              properties:
                accion:
                  type: "string"
                esquema:
                  type: "string"
                id_app:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/devel_db_admin/copiar_esquema":
    post:
      operationId: "post_devel_db_admin_copiar_esquema"
      summary: "Copiar Esquema"
      description: |
        Copia tablas de configuración desde un esquema de referencia y traslada datos `resto→dl` según flags comun/sv/sf (paso «importar datos» del asistente de nuevo esquema).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/devel_db_admin/api/copiar_esquema.md`
      tags:
        - "devel_db_admin"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "esquema"
                - "region"
                - "dl"
              properties:
                comun:
                  type: "integer"
                dl:
                  type: "string"
                esquema:
                  type: "string"
                region:
                  type: "string"
                sf:
                  type: "integer"
                sv:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/devel_db_admin/corregir_renombrar_esquema":
    post:
      operationId: "post_devel_db_admin_corregir_renombrar_esquema"
      summary: "Corregir Renombrar Esquema"
      description: |
        Repara un renombre de esquema interrumpido: reaplica defaults ALTER, reanuda renombre PostgreSQL, alinea propietarios y sincroniza `.inc` / `db_idschema`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/devel_db_admin/api/corregir_renombrar_esquema.md`
      tags:
        - "devel_db_admin"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "region"
                - "dl"
              properties:
                comun:
                  type: "integer"
                dl:
                  type: "string"
                esquema:
                  type: "string"
                esquema_origen:
                  type: "string"
                region:
                  type: "string"
                sf:
                  type: "integer"
                sv:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/devel_db_admin/crear_esquema":
    post:
      operationId: "post_devel_db_admin_crear_esquema"
      summary: "Crear Esquema"
      description: |
        Crea esquemas PostgreSQL (comun / sv / sv-e / sf) clonando la estructura de un esquema de referencia.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/devel_db_admin/api/crear_esquema.md`
      tags:
