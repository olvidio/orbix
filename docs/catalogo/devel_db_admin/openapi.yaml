      operationId: "post_devel_db_admin_mover_tabla"
      summary: "Mover Tabla"
      description: |
        Mueve una tabla de sv (`publicv`) a sv-e (`publicv-e`) en todos los esquemas que la contienen.
        
        Operacion: `mutacion`.
        
