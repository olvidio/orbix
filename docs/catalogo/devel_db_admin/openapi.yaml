    post:
      operationId: "post_devel_db_admin_renombrar_esquema"
      summary: "Renombrar Esquema"
      description: |
        Renombra un esquema `region-dl` (comun/sv/sv-e/sf): roles PostgreSQL, `.inc`, `db_idschema` y defaults.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/devel_db_admin/api/renombrar_esquema.md`
      tags:
