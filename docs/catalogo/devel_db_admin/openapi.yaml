      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                modo:
                  type: "string"
                prefijo_hasta:
                  type: "string"
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
