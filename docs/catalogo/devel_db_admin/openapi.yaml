      operationId: "post_devel_db_admin_crear_usuarios"
      summary: "Crear Usuarios"
      description: |
        Crea roles PostgreSQL para un esquema `region-dl` y registra passwords en ficheros de importación.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/devel_db_admin/api/crear_usuarios.md`
      tags:
        - "devel_db_admin"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
