openapi: "3.1.0"
info:
  title: "Orbix API - ubiscamas"
  version: "0.1.0"
  description: |
    OpenAPI generado desde `docs/catalogo`. Revisar obligatoriedad de campos y ejemplos antes de publicarlo como contrato estable.
  license:
    name: "Proprietary"
    identifier: "LicenseRef-Proprietary"
servers:
  - url: "/"
security:
  - OrbixSession: []
paths:
  "/src/ubiscamas/actividad_habitaciones_lista":
    post:
      operationId: "post_ubiscamas_actividad_habitaciones_lista"
      summary: "Actividad Habitaciones Lista"
      description: |
        Construye el listado de habitaciones/camas de la ubi de una actividad con ocupación por asistente. Filtra solo camas VIP si la actividad tiene `desc_activ=camasVIP`. El controller añade URLs firmadas para asignar cama, toggle VIP y subvistas.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/ubiscamas/api/actividad_habitaciones_lista.md`
      tags:
        - "ubiscamas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_activ"
              properties:
                id_activ:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/ubiscamas/cama_delete":
    post:
      operationId: "post_ubiscamas_cama_delete"
      summary: "Cama Delete"
      description: |
        Elimina una cama por UUID desde el formulario de habitación.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/ubiscamas/api/cama_delete.md`
      tags:
        - "ubiscamas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_cama"
              properties:
                id_cama:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/ubiscamas/cama_form_data":
    post:
      operationId: "post_ubiscamas_cama_form_data"
      summary: "Cama Form Data"
      description: |
        Carga el modal de edición de una cama. Si `id_cama` vacío genera UUID nuevo; si existe lee descripción, larga y VIP del repositorio.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/ubiscamas/api/cama_form_data.md`
      tags:
        - "ubiscamas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_cama:
                  type: "string"
                id_habitacion:
                  type: "string"
                id_ubi:
                  type: "integer"
                mod:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/ubiscamas/cama_update":
    post:
      operationId: "post_ubiscamas_cama_update"
      summary: "Cama Update"
      description: |
        Alta o edición de una cama (descripción, larga, VIP) en una habitación. `sel` puede traer `id_cama` como primer token.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/ubiscamas/api/cama_update.md`
      tags:
        - "ubiscamas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                sel:
                  type: "array"
                  items:
                    type: string
                id_cama:
                  type: "string"
                id_habitacion:
                  type: "string"
                descripcion:
                  type: "string"
                larga:
                  type: "string"
                vip:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/ubiscamas/habitacion_delete":
    post:
      operationId: "post_ubiscamas_habitacion_delete"
      summary: "Habitacion Delete"
      description: |
        Elimina una habitación CDC por `id_habitacion` o token `sel` (`id_habitacion#...`).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/ubiscamas/api/habitacion_delete.md`
      tags:
        - "ubiscamas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                sel:
                  type: "array"
                  items:
                    type: string
                id_habitacion:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/ubiscamas/habitacion_form_data":
    post:
      operationId: "post_ubiscamas_habitacion_form_data"
      summary: "Habitacion Form Data"
      description: |
        Prepara el formulario de alta o edición de una habitación en un ubi CDC. Con `nuevo` vacío y `sel` o `id_habitacion` carga la habitación y sus camas; sin id genera orden siguiente y defaults (1 cama, 1 VIP). `sel` usa token `id_habitacion#...`.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/ubiscamas/api/habitacion_form_data.md`
      tags:
        - "ubiscamas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_habitacion:
                  type: "string"
                id_ubi:
                  type: "integer"
                nuevo:
                  type: "string"
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/ubiscamas/habitacion_update":
    post:
      operationId: "post_ubiscamas_habitacion_update"
      summary: "Habitacion Update"
      description: |
        Alta o actualización de habitación CDC y sincronización de camas: guarda datos de habitación, crea camas desde `new_camas_*` y auto-genera camas hasta alcanzar `numero_camas` (marcando VIP hasta `numero_camas_vip`). `sel` puede traer `id_habitacion` como primer token.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/ubiscamas/api/habitacion_update.md`
      tags:
        - "ubiscamas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                sel:
                  type: "array"
                  items:
                    type: string
                id_habitacion:
                  type: "string"
                id_ubi:
                  type: "integer"
                orden:
                  type: "integer"
                nombre:
                  type: "string"
                numero_camas:
                  type: "integer"
                numero_camas_vip:
                  type: "integer"
                planta:
                  type: "string"
                tipoLavabo:
                  type: "integer"
                sillon:
                  type: "string"
                adaptada:
                  type: "string"
                observaciones:
                  type: "string"
                despacho:
                  type: "string"
                new_camas_desc:
                  type: "array"
                  items:
                    type: string
                new_camas_larga:
                  type: "array"
                  items:
                    type: string
                new_camas_vip:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/ubiscamas/update_cama_asistente":
    post:
      operationId: "post_ubiscamas_update_cama_asistente"
      summary: "Update Cama Asistente"
      description: |
        Asigna o reasigna la cama de un asistente en una actividad. `id_activ` se extrae de la cápsula `ctx` firmada (`HashB::sign('update_cama_asistente', {id_activ})`); `id_cama` vacío desasigna.
        
        Requiere cápsula HashB en `` (accion ``).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/ubiscamas/api/update_cama_asistente.md`
      tags:
        - "ubiscamas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "ctx"
                - "id_nom"
              properties:
                ctx:
                  type: "string"
                id_nom:
                  type: "integer"
                id_cama:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ubiscamas_UpdateCamaAsistenteDataResponse"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ubiscamas_UpdateCamaAsistenteDataResponse"
  "/src/ubiscamas/update_solo_vip":
    post:
      operationId: "post_ubiscamas_update_solo_vip"
      summary: "Update Solo Vip"
      description: |
        Marca o desmarca el modo «solo camas VIP» de una actividad (`desc_activ=camasVIP` si `solo_vip=true`). `id_activ` viene de la cápsula `ctx` (`HashB::sign('update_solo_vip', {id_activ})`).
        
        Requiere cápsula HashB en `` (accion ``).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/ubiscamas/api/update_solo_vip.md`
      tags:
        - "ubiscamas"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "ctx"
              properties:
                ctx:
                  type: "string"
                solo_vip:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
components:
  securitySchemes:
    OrbixSession:
      type: apiKey
      in: cookie
      name: PHPSESSID
  schemas:
    OrbixStandardResponseEnvelope:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          description: "Ver schema concreto de cada operacion."
    ubiscamas_UpdateCamaAsistenteData:
      type: object
      properties:
        success:
          type: "string"
    ubiscamas_UpdateCamaAsistenteDataResponse:
      allOf:
        - $ref: "#/components/schemas/OrbixStandardResponseEnvelope"
        - type: object
          properties:
            data:
              oneOf:
                - type: string
                  description: "JSON codificado como string (compatibilidad legacy)."
                - $ref: "#/components/schemas/ubiscamas_UpdateCamaAsistenteData"
    OrbixStandardResponseStringData:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          description: "En ContestarJson::enviar, los arrays/objetos suelen llegar codificados como string JSON por compatibilidad."
