paths:
  "/src/menus/grupmenu_coleccion":
    post:
      operationId: "post_menus_grupmenu_coleccion"
      summary: "Grupmenu Colección (menú lateral)"
      description: |
        Grupos de menú visibles para el usuario actual (mismo criterio que el menú lateral en `index.php`: rol en `aux_grupmenu_rol`, al menos un ítem en menú, `orden` ≥ 1). Por cada grupo devuelve las entradas visibles filtradas por permisos Bit, módulos y apps instalados.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/menus/api/grupmenu_coleccion.md`
      tags:
        - "menus"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseNestedData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseNestedData"
  "/src/menus/grupmenu_eliminar":
    post:
      operationId: "post_menus_grupmenu_eliminar"
      summary: "Eliminar grupmenu"
      description: |
        Elimina un grupo de menú a partir del token `sel` de la lista.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/menus/api/grupmenu_eliminar.md`
      tags:
        - "menus"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "sel"
              properties:
                sel:
                  type: "array"
                  items:
                    type: string
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
