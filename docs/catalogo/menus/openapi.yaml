                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/menus/lista_templates":
    post:
      operationId: "post_menus_lista_templates"
      summary: "Lista de plantillas de menú"
      description: |
        Plantillas (`ref_*` en BD pública) disponibles para importar un conjunto de menús.
        
        Operacion: `lista_data`.
        
        Fuente catalogo: `docs/catalogo/menus/api/lista_templates.md`
      tags:
