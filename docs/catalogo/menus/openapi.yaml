      operationId: "post_menus_menu_guardar"
      summary: "Guardar ítem de menú"
      description: |
        Alta o edición de una entrada del árbol de menú por layout (`aux_menus`).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/menus/api/menu_guardar.md`
      tags:
        - "menus"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                filtro_grupo:
                  type: "integer"
                id_menu:
                  type: "integer"
                id_metamenu:
                  type: "integer"
                ok:
                  type: "string"
                orden:
                  type: "string"
                parametros:
                  type: "string"
                perm_menu:
                  type: "array"
                  items:
                    type: string
                txt_menu:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/menus/menu_mover":
