        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/menus/menus_burger_layout_data":
    post:
      operationId: "post_menus_menus_burger_layout_data"
      summary: "Datos menú layout Burger/Pills2"
      description: |
        Árbol de menú para layouts modernos: grupo Utilidades (HTML usuario) + resto de grupos según `lista_grup_menu_json`.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/menus/api/menus_burger_layout_data.md`
      tags:
        - "menus"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                lista_grup_menu_json:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/menus/menus_exportar":
    post:
      operationId: "post_menus_menus_exportar"
      summary: "Exportar menús a plantilla (ref)"
      description: |
        Copia `aux_grupmenu`, `aux_grupmenu_rol` y `aux_menus` (ok=true) del esquema activo a tablas `ref_*` en BD pública, asociadas a una plantilla (`id_template_menu`).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/menus/api/menus_exportar.md`
      tags:
        - "menus"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "nombre"
              properties:
                nombre:
                  type: "string"
                sobreescribir:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/menus/menus_exportar_ref_a_ficheros":
    post:
      operationId: "post_menus_menus_exportar_ref_a_ficheros"
      summary: "Exportar/importar ref menús ↔ ficheros SQL"
      description: |
        Operación de mantenimiento: genera ficheros COPY en `log/menus/` o ejecuta `psql` para volcar ref→BD pública. **No devuelve JSON**; respuesta vacía o errores en `log/menus/menus.log`.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/menus/api/menus_exportar_ref_a_ficheros.md`
      tags:
        - "menus"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "accion"
              properties:
                accion:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/menus/menus_generar_txt":
    post:
      operationId: "post_menus_menus_generar_txt"
      summary: "Generar fichero de textos para gettext"
      description: |
        Regenera `frontend/menus/view/traducir_menu.phtml` con llamadas `_()` por cada etiqueta de menú activo y tipos de repetición de actividades.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/menus/api/menus_generar_txt.md`
      tags:
        - "menus"
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                _sin_parametros_detectados:
                  type: string
                  description: "No se han inferido campos desde el catalogo."
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/menus/menus_get_page_data":
    post:
      operationId: "post_menus_menus_get_page_data"
      summary: "Datos página gestor de menú (lista o ficha)"
      description: |
        Builder para `menus_get.php`: modo listado de ítems del grupmenu seleccionado o modo edición/alta.
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/menus/api/menus_get_page_data.md`
      tags:
        - "menus"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                filtro_grupo:
                  type: "string"
                nuevo:
                  type: "string"
                id_menu:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/menus/menus_importar":
    post:
      operationId: "post_menus_menus_importar"
      summary: "Importar plantilla de menú al esquema activo"
      description: |
        TRUNCATE + INSERT desde `ref_*` (BD pública) hacia `aux_grupmenu`, `aux_grupmenu_rol`, `aux_menus` del esquema de trabajo. **Destructivo**: borra menús locales antes de importar.
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/menus/api/menus_importar.md`
      tags:
        - "menus"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - "id_template_menu"
              properties:
                id_template_menu:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/menus/menus_importar_de_ficheros_a_ref":
    post:
      operationId: "post_menus_menus_importar_de_ficheros_a_ref"
      summary: "Restaurar menús por defecto (ref → esquemas DL)"
      description: |
        Flujo HTML en dos pasos: confirmación (`seguro=2`) y ejecución (`seguro=1`). Copia tablas `ref_*` de BD pública a `aux_*` de uno o todos los esquemas regionales. **No JSON.**
        
        Requiere cápsula HashB en `` (accion ``).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/menus/api/menus_importar_de_ficheros_a_ref.md`
      tags:
        - "menus"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                seguro:
                  type: "integer"
                todos:
                  type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
    get:
      operationId: "get_menus_menus_importar_de_ficheros_a_ref"
      summary: "Restaurar menús por defecto (ref → esquemas DL)"
      description: |
        Flujo HTML en dos pasos: confirmación (`seguro=2`) y ejecución (`seguro=1`). Copia tablas `ref_*` de BD pública a `aux_*` de uno o todos los esquemas regionales. **No JSON.**
        
        Requiere cápsula HashB en `` (accion ``).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/menus/api/menus_importar_de_ficheros_a_ref.md`
      tags:
        - "menus"
      parameters:
        - name: "seguro"
          in: query
          required: false
          schema:
            type: "integer"
        - name: "todos"
          in: query
          required: false
          schema:
            type: "integer"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
  "/src/menus/menus_legacy_layout_items_data":
    post:
      operationId: "post_menus_menus_legacy_layout_items_data"
      summary: "Ítems menú layout Legacy"
      description: |
        Entradas visibles para grupmenu 1 (Utilidades) + el grupmenu activo, con filtro de raíz jerárquica (`orden[0]`).
        
        Operacion: `form_data`.
        
        Fuente catalogo: `docs/catalogo/menus/api/menus_legacy_layout_items_data.md`
      tags:
        - "menus"
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id_grupmenu:
                  type: "string"
      responses:
        "200":
          description: "Respuesta generada por Orbix."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
        "400":
          description: "Peticion no valida o error de validacion."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbixStandardResponseStringData"
components:
  securitySchemes:
    OrbixSession:
      type: apiKey
      in: cookie
      name: PHPSESSID
  schemas:
    OrbixStandardResponseStringData:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          oneOf:
            - type: string
            - type: object
            - type: array
              items: {}
          description: "En ContestarJson::enviar, los arrays/objetos suelen llegar codificados como string JSON por compatibilidad."
    OrbixStandardResponseNestedData:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
        mensaje:
          type: string
        data:
          oneOf:
            - type: object
            - type: array
              items: {}
            - type: string
