      operationId: "post_menus_menu_copiar"
      summary: "Copiar ítem de menú"
      description: |
        Clona un ítem de menú en otro grupmenu (`gm_new`).
        
        Operacion: `mutacion`.
        
        Fuente catalogo: `docs/catalogo/menus/api/menu_copiar.md`
      tags:
